<!DOCTYPE html>
<html>

<head>
    <title>Firebase Student Database</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        .container {
            width: 350px;
            margin: 50px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px gray;
        }

        input {
            width: 95%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }

        #output {
            margin-top: 20px;
        }
    </style>

</head>

<body>

    <div class="container">

        <h2>Firebase Student Database</h2>

        <input type="text" id="name" placeholder="Enter Name">

        <input type="number" id="age" placeholder="Enter Age">

        <button onclick="saveData()">Save</button>

        <button onclick="loadData()">Show Data</button>

        <div id="output"></div>

    </div>

    <script type="module" src="script.js"></script>

</body>

</html>
